<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Silsilah Keluarga</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" sizes="192x192" href="icon-192.png">
  <link class="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#2c5e4f">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #2c5e4f; font-family: sans-serif; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

    /* Banner Instalasi dari Atas */
    #banner-install-irfin {
      display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 400px; background: #ffffff; padding: 12px 10px 12px 12px;
      border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); z-index: 9999; 
      border: 1px solid #e0e0e0; animation: slideDown 0.5s ease-out;
    }
    @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
    .flex-banner { display: flex; align-items: center; gap: 10px; }
    .icon-app-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
    .text-banner { flex-grow: 1; }
    .text-banner h4 { margin: 0; font-size: 14px; color: #333; font-weight: bold;}
    .text-banner p { margin: 0; font-size: 11px; color: #666; }
    .btn-install { background: #2c5e4f; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
    .btn-close-x { background: none; border: none; font-size: 18px; color: #999; cursor: pointer; padding: 0 5px; margin-left: 2px; }

    @media (display-mode: standalone) { #banner-install-irfin { display: none !important; } }
  </style>
</head>
<body>

  <iframe allow="geolocation; camera; microphone" allowfullscreen="true" src="https://script.google.com/macros/s/AKfycbx2773VjddRYl7lEbmaFOWG31voTzZGlqSIyhvaA6_Zl6D0IKr4QISLDfMUXbWt0HcQcg/exec"></iframe>

  <div id="banner-install-irfin">
    <div class="flex-banner">
      <img class="icon-app-img" src="icon-192.png"/>
      <div class="text-banner">
        <h4>Instal Silsilah Keluarga</h4>
        <p>Akses lebih cepat & stabil di HP</p>
      </div>
      <button class="btn-install" id="btnInstallIrfin">INSTAL</button>
      <button class="btn-close-x" id="btnCloseIrfin">&times;</button>
    </div>
  </div>

  <script>
    // 1. Daftarkan Service Worker menggunakan jalur relatif lingkungan repositori
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log("Service Worker Terdaftar!");
      });
    }

    // 2. Logika Banner Otomatis Muncul Setelah 3 Detik
    let deferredPrompt = null; 
    const banner = document.getElementById('banner-install-irfin');
    const btnInstall = document.getElementById('btnInstallIrfin');
    const btnClose = document.getElementById('btnCloseIrfin');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Munculkan banner setelah 3 detik jika belum pernah ditutup pada sesi ini
      setTimeout(() => {
        if (deferredPrompt && !sessionStorage.getItem('sudahTutupBannerSilsilah')) {
          banner.style.style.display = 'block';
        }
      }, 3000);
    });

    btnInstall.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          banner.style.display = 'none';
          sessionStorage.setItem('sudahTutupBannerSilsilah', 'true');
        }
        deferredPrompt = null;
      }
    });

    btnClose.addEventListener('click', () => {
      banner.style.display = 'none';
      sessionStorage.setItem('sudahTutupBannerSilsilah', 'true');
    });

    window.addEventListener('appinstalled', () => {
      banner.style.display = 'none';
    });
  </script>
</body>
</html>
